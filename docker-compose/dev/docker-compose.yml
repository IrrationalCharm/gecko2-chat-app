services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --http-host=0.0.0.0
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker-data/keycloak/data:/opt/keycloak/data
      - ../../keycloak-config/gecko-theme:/opt/keycloak/themes/gecko-theme
    healthcheck:
      test: ["CMD-SHELL", "exec 3<> /dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; if [ $? -eq 0 ]; then echo 'Healthcheck Successful'; exit 0; else echo 'Healthcheck Failed'; exit 1; fi;"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  mongodb:
    image: mongo:8.2.4
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./docker-data/mongo/db:/data/db
    restart: unless-stopped
    healthcheck:
      # Pings the database using the root credentials defined in environment variables
      test: [ "CMD-SHELL", "mongosh --username admin --password password --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping')\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: user_service
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres/data:/var/lib/postgresql/data
    healthcheck:
      # Checks if the 'admin' user can connect to the 'user_service' database
      test: [ "CMD-SHELL", "pg_isready -U admin -d user_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka-native:4.1.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      # 1. CONTROLLER: Internal communication for KRaft
      # 2. PLAINTEXT: Internal Docker network (messaging-service uses this)
      # 3. PLAINTEXT_HOST: External access (Your IDE/IntelliJ uses this)
      KAFKA_LISTENERS: 'CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:9094'

      # Advertised Listeners (What clients actually use to connect):
      # - Clients outside docker (IDE) see 'localhost:9092'
      # - Clients inside docker see 'kafka:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # Dev optimizations (single node)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - ./docker-data/kafka:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      # Checks if the broker is listening on port 9092 (PLAINTEXT_HOST)
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis-messaging-service:
    image: redis:alpine
    container_name: redis-messaging-service
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-gateway:
    image: redis:alpine
    container_name: redis-gateway
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ### Microservices ###

  configserver:
    image: gecko2/config-server:latest
    container_name: configserver
    ports:
      - "8888:8888"
    healthcheck:
      test: "wget -q -O - http://localhost:8888/actuator/health/readiness | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 700m

  api-gateway:
    image: gecko2/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWK_SET_URI=http://keycloak:8080/realms/gecko2-realm/protocol/openid-connect/certs
      - USER_SERVICE_URI=http://user-service:8083
      - PERSISTENCE_SERVICE_URI=http://message-persistence-service:8086
      - MOBILE_BFF_URI=http://mobile-bff:8087
      - MESSAGING_SERVICE_WS_URI=ws://messaging-service:8084
      - MESSAGING_SERVICE_HTTP_URI=http://messaging-service:8084
      - MEDIA_SERVICE_URI=http://media-service:8089
      - REDIS_GATEWAY_HOST=redis-gateway
      - REDIS_GATEWAY_PORT=6379
    depends_on:
      keycloak:
        condition: service_healthy
      configserver:
        condition: service_healthy
      redis-gateway:
        condition: service_healthy
    healthcheck:
      test: "wget -q -O - http://localhost:8081/actuator/health/readiness | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 700m

  mobile-bff:
    image: gecko2/mobile-bff:latest
    container_name: mobile-bff
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      keycloak:
        condition: service_healthy
      configserver:
        condition: service_healthy
    healthcheck:
      test: "wget -q -O - http://localhost:8087/mobile-bff/actuator/health/readiness | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 700m

  message-persistence-service:
    image: gecko2/message-persistence-service:latest
    container_name: message-persistence-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      keycloak:
        condition: service_healthy
      configserver:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: "wget -q -O - http://localhost:8086/message-persistence-service/actuator/health/readiness | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 700m

  messaging-service:
    image: gecko2/messaging-service:latest
    container_name: messaging-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWK_SET_URI=http://keycloak:8080/realms/gecko2-realm/protocol/openid-connect/certs
      - REDIS_GATEWAY_HOST=redis-messaging-service
      - REDIS_GATEWAY_PORT=6379
      - USER_SERVICE_URI=http://user-service:8083/user-service/internal/api/v1
      - KAFKA_BOOTSTRAP_URI=kafka:9094
    depends_on:
      keycloak:
        condition: service_healthy
      configserver:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis-messaging-service:
        condition: service_healthy
    healthcheck:
      test: "wget -q -O - http://localhost:8084/actuator/health/readiness | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 700m

  user-service:
    image: gecko2/user-service:latest
    container_name: user-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      keycloak:
        condition: service_healthy
      configserver:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: "wget -q -O - http://localhost:8083/user-service/actuator/health/readiness | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 700m

  media-service:
    image: gecko2/media-service:latest
    container_name: media-service
    env_file:
      - ../../.env.local
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      keycloak:
        condition: service_healthy
      configserver:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: "wget -q -O - http://localhost:8089/media-service/actuator/health/readiness | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 700m
