server:
  port: 8081

spring:
  application:
    name: gateway
  config:
    import: configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8083
              predicates:
                - Path=/user-service/**
            - id: messaging-persistence-service
              uri: http://localhost:8086
              predicates:
                - Path=/message-persistence-service/**
            - id: mobile-bff
              uri: http://localhost:8087
              predicates:
                - Path=/mobile-bff/**
