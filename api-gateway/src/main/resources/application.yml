#Global settings
spring:
  application:
    name: gateway
  profiles:
    active: dev

server:
  port: 8081

---
# Settings for 'dev' profile (Localhost)
spring:
  config:
    activate:
      on-profile: dev
    import: configserver:http://localhost:8888

---
# Settings for 'docker' profile
spring:
  config:
    activate:
      on-profile: docker
    import: configserver:http://configserver:8888
