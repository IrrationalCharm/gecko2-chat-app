#Global settings
server:
  port: 8087

spring:
  profiles:
    active: dev
  application:
    name: mobile-bff
  threads:
    virtual:
      enabled: true
  mvc:
    servlet:
      path: "/mobile-bff"

management:
  endpoints:
    web:
      exposure:
        include: "*" #Exposes all actuator endpoints
  health:
    readiness-state:
      enabled: true #Makes sure app is ready to answer calls.
    liveness-state:
      enabled: true #Makes sure the app is alive.
  endpoint:
    health:
      probes:
        enabled: true

---
# Settings for 'dev' profile (Localhost)
spring:
  config:
    activate:
      on-profile: dev
    import: configserver:http://localhost:8888

---
# Settings for 'docker' profile
spring:
  config:
    activate:
      on-profile: docker
    import: configserver:http://configserver:8888
