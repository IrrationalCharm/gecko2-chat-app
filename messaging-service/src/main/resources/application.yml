server:
  port: 8084

jwkSetUri: ${JWK_SET_URI:http://localhost:8080/realms/gecko2-realm/protocol/openid-connect/certs}

spring:
  profiles:
    active: dev
  application:
    name: messaging-service
  cloud:
    openfeign:
      oauth2:
        enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # This triggers the creation of the JwtDecoder bean
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8080/realms/gecko2-realm/protocol/openid-connect/certs}
  data:
    redis:
      host: ${REDIS_GATEWAY_HOST:localhost}
      port: ${REDIS_GATEWAY_PORT:6379}
      cache:
        user-graph: "user-graph"
  feign:
    client:
      user-service:
        v1:
          base-url: ${USER_SERVICE_URI:http://localhost:8083/user-service/internal/api/v1}
  kafka:
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    bootstrap-servers: ${KAFKA_BOOTSTRAP_URI:localhost:9092}
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_URI:localhost:9092} #,localhost:9093... for more kafka brokers
      group-id: messaging-service-group
      auto-offset-reset: earliest #If no committed offset exists for this consumer group, start consuming from the beginning of the topic.
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring:
          json:
            #default:
            #  type: eu.irrationalcharm.messagingservice.event.UserUpdateEvent
            trusted:
              packages: eu.irrationalcharm.events,eu.irrationalcharm.events.chat
            #type:
            #  mapping: "eu.irrationalcharm.userservice.event.UserUpdateEvent:eu.irrationalcharm.messaging_service.event.UserUpdateEvent"
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_URI:localhost:9092}
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
    topic:
      user-updates: "user-updates-topic"
      chat-events: "chat-events"
      notification-update: "notification-topic"

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10 # Number of calls to record for calculating the failure rate
        permitted-number-of-calls-in-half-open-state: 2 # Number of test calls allowed when in HALF_OPEN state
        failure-rate-threshold: 50 # Percentage of failed calls (out of sliding window) to trip the circuit to OPEN
        wait-duration-in-open-state: 10s
    instances:
      social-graph:
        base-config: default
      social-graph-username:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
    instances:
      social-graph:
        base-config: default
      social-graph-username:
        base-config: default

management:
  tracing:
    sampling:
      probability: ${SAMPLING_PROBABILITY:1.0}
  otlp:
    metrics:
      export:
        url: ${GRAFANA_METRICS_URL:http://localhost:4318/v1/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${GRAFANA_TRACES_URL:http://localhost:4318/v1/traces}
    logging:
      export:
        otlp:
          endpoint: ${GRAFANA_LOGS_URL:http://localhost:4318/v1/logs}
  endpoints:
    web:
      exposure:
        include: "*" #Exposes all actuator endpoints
  health:
    readiness-state:
      enabled: true #Makes sure app is ready to answer calls.
    liveness-state:
      enabled: true #Makes sure the app is alive.
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    eu.irrationalcharm.messaging_service.*: DEBUG
    org.apache.kafka.clients.NetworkClient: WARN
    org.apache.kafka.clients.consumer.internals.ConsumerCoordinator: WARN
    org.apache.kafka.clients.admin.AdminClient: WARN

